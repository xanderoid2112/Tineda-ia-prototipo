<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - AI Market</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #28a745, #1f8c39);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h2 {
            color: #28a745;
            font-weight: bold;
        }

        .nav-pills .nav-link {
            color: #6c757d;
            font-weight: 600;
        }

        .nav-pills .nav-link.active {
            background-color: #28a745;
            color: white;
        }

        .btn-success {
            background-color: #28a745;
            border-color: #28a745;
            font-weight: 600;
            padding: 0.75rem;
        }

        .btn-success:hover {
            background-color: #218838;
            border-color: #1e7e34;
        }

        .form-control:focus {
            border-color: #28a745;
            box-shadow: 0 0 0 0.25rem rgba(40, 167, 69, 0.25);
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-header">
            <h2>AI Market</h2>
            <p class="text-muted">Bienvenido a tu supermercado inteligente</p>
        </div>

        <!-- Tabs de Navegación -->
        <ul class="nav nav-pills nav-fill mb-4" id="authTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="login-tab" data-bs-toggle="pill" data-bs-target="#login-content"
                    type="button" role="tab">Iniciar Sesión</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="register-tab" data-bs-toggle="pill" data-bs-target="#register-content"
                    type="button" role="tab">Registrarse</button>
            </li>
        </ul>

        <div class="tab-content" id="authTabsContent">
            <!-- Formulario de Login -->
            <div class="tab-pane fade show active" id="login-content" role="tabpanel">
                <form id="login-form">
                    <div class="mb-3">
                        <label for="login-email" class="form-label">Correo Electrónico</label>
                        <input type="email" class="form-control" id="login-email" placeholder="nombre@ejemplo.com"
                            required>
                    </div>
                    <div class="mb-3">
                        <label for="login-password" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" id="login-password" placeholder="********" required>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success">Ingresar</button>
                    </div>
                </form>
            </div>

            <!-- Formulario de Registro -->
            <div class="tab-pane fade" id="register-content" role="tabpanel">
                <form id="register-form">
                    <div class="mb-3">
                        <label for="register-name" class="form-label">Nombre Completo</label>
                        <input type="text" class="form-control" id="register-name" placeholder="Juan Pérez" required>
                    </div>
                    <div class="mb-3">
                        <label for="register-email" class="form-label">Correo Electrónico</label>
                        <input type="email" class="form-control" id="register-email" placeholder="nombre@ejemplo.com"
                            required>
                    </div>
                    <div class="mb-3">
                        <label for="register-password" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" id="register-password" placeholder="********"
                            required>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success">Crear Cuenta</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Mensajes de Alerta -->
        <div id="alert-message" class="alert mt-3" style="display: none;" role="alert"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
   <script>
        // Función para mostrar alertas
        function showAlert(message, type = 'danger') {
            const alertBox = document.getElementById('alert-message');
            alertBox.className = `alert alert-${type} mt-3`;
            alertBox.textContent = message;
            alertBox.style.display = 'block';
            setTimeout(() => alertBox.style.display = 'none', 5000);
        }

        // SIMULACIÓN DE LOGIN PARA LA PRESENTACIÓN
        document.getElementById('login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const btn = this.querySelector('button');
            btn.disabled = true;
            btn.textContent = 'Verificando...';

            // Simulamos un pequeño retraso de red para que se vea real
            setTimeout(() => {
                // Forzamos el ID 1 para que la IA lea el historial simulado que ya funciona
                localStorage.setItem('token', 'token-simulado-para-presentacion');
                localStorage.setItem('usuario', JSON.stringify({
                    id: 1, 
                    nombre: 'Usuario Demo',
                    email: document.getElementById('login-email').value,
                    rol: 'USER'
                }));

                showAlert('¡Bienvenido! Redirigiendo...', 'success');
                setTimeout(() => window.location.href = 'index.html', 1500);
            }, 800);
        });

        // SIMULACIÓN DE REGISTRO PARA LA PRESENTACIÓN
        document.getElementById('register-form').addEventListener('submit', function (e) {
            e.preventDefault();
            const nombre = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const btn = this.querySelector('button');

            btn.disabled = true;
            btn.textContent = 'Creando cuenta...';

            setTimeout(() => {
                // Guardamos la sesión automáticamente al registrarse
                localStorage.setItem('token', 'token-simulado-para-presentacion');
                localStorage.setItem('usuario', JSON.stringify({
                    id: 1, // Usamos el ID 1 para no romper la lógica de la IA
                    nombre: nombre,
                    email: email,
                    rol: 'USER'
                }));

                showAlert('¡Cuenta creada con éxito! Redirigiendo...', 'success');
                setTimeout(() => window.location.href = 'index.html', 1500);
            }, 1000);
        });
    </script>
</body>

</html>
