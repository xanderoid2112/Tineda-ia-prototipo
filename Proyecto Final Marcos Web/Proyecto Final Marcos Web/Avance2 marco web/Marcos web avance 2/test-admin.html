<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Administración - AI Market</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/administracion.css">
</head>
<body>
    <div class="admin-container">
        <div class="sidebar">
            <div class="brand">
                <i class="fas fa-store"></i>
                <h1>AI Market</h1>
            </div>
            <div class="nav-links">
                <div class="nav-item active">
                    <i class="fas fa-home"></i>
                    <span>Dashboard</span>
                </div>
                <div class="nav-item">
                    <i class="fas fa-apple-alt"></i>
                    <span>Productos</span>
                </div>
            </div>
        </div>
        
        <div class="main-content">
            <div class="header">
                <div class="welcome">
                    <h2>Bienvenido, Administrador</h2>
                    <p>Gestiona tu supermercado inteligente desde este panel</p>
                </div>
                <div class="user-info">
                    <span>admin@aimarket.com</span>
                    <div class="user-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                </div>
            </div>
            
            <div class="dashboard-cards">
                <div class="card">
                    <div class="card-title">Productos Totales</div>
                    <div class="card-value">0</div>
                    <div class="card-info">
                        <i class="fas fa-arrow-up"></i>
                        <span>+0 desde el mes pasado</span>
                    </div>
                    <div class="card-icon">
                        <i class="fas fa-apple-alt"></i>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-title">Stock Total</div>
                    <div class="card-value">0</div>
                    <div class="card-info">
                        <i class="fas fa-arrow-up"></i>
                        <span>+0 desde el mes pasado</span>
                    </div>
                    <div class="card-icon">
                        <i class="fas fa-box"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
